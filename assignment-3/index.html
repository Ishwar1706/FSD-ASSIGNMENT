<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONAWANE FASHION HUB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container d-flex justify-content-between">
        <h4 class="text-pink fw-bold">SONAWANE FASHION HUB</h4>

        <input type="text" class="form-control w-50" placeholder="Search for products...">

        <div>
            <a href="#">Login</a>
            <a href="#" class="ms-3">Cart</a>
        </div>
    </div>
</nav>

<div class="category-bar py-2">
    <div class="container d-flex justify-content-between">
        <span>Women Ethnic</span>
        <span>Women Western</span>
        <span>Men</span>
        <span>Kids</span>
        <span>Home & Kitchen</span>
        <span>Beauty</span>
    </div>
</div>

<div class="container mt-4">
    <div class="banner text-center text-white p-5">
        <h2>Big Sale</h2>
        <p>Up to 60% OFF</p>
    </div>
</div>


<div class="container mt-5">
    <div class="row">

        <!-- Product Card 1 -->
        <div class="col-md-3 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03"
                     class="card-img-top">
                <div class="card-body">
                    <h6>Women Kurti</h6>
                    <p class="fw-bold">₹599</p>
                    <button class="btn btn-pink w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product Card 2 -->
        <div class="col-md-3 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1740711152088-88a009e877bb?q=80&w=1480&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                     class="card-img-top">
                <div class="card-body">
                    <h6>Men Shirt</h6>
                    <p class="fw-bold">₹899</p>
                    <button class="btn btn-pink w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product Card 3 -->
        <div class="col-md-3 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
                     class="card-img-top">
                <div class="card-body">
                    <h6>Handbag</h6>
                    <p class="fw-bold">₹1299</p>
                    <button class="btn btn-pink w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product Card 4 -->
        <div class="col-md-3 mb-4">
            <div class="card">
                <img src="https://plus.unsplash.com/premium_photo-1682125779534-76c5debea767?q=80&w=1431&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                     class="card-img-top">
                <div class="card-body">
                    <h6>Watch</h6>
                    <p class="fw-bold">₹1999</p>
                    <button class="btn btn-pink w-100">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
